retargeting:
  type: vector
  urdf_path: unitree_dex3/dex3_hand_left.urdf

  # Vector retargeting: wrist → fingertip vectors
  # Dex3 has 3 fingers: thumb, index, middle
  target_origin_link_names: [ "wrist", "wrist", "wrist" ]
  target_task_link_names: [ "thumb_tip", "index_tip", "middle_tip" ]
  scaling_factor: 1.0

  # Human hand MediaPipe keypoint indices:
  # 0=wrist, 4=thumb_tip, 8=index_tip, 12=middle_tip
  # First row: origin indices (wrist for all), Second row: task indices (fingertips)
  target_link_human_indices: [ [ 0, 0, 0 ], [ 4, 8, 12 ] ]

  low_pass_alpha: 0.2
